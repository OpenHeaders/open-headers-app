name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install Python setuptools (Windows)
        if: matrix.os == 'windows-latest'
        run: pip install setuptools
        shell: bash

      - name: Install RPM tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm librpm-dev
          rpm --version

      - name: Create Electron cache directories
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            mkdir -p ~/.cache/electron ~/.cache/electron-builder
          elif [ "$RUNNER_OS" == "macOS" ]; then
            mkdir -p ~/Library/Caches/electron ~/Library/Caches/electron-builder ~/.electron
          elif [ "$RUNNER_OS" == "Windows" ]; then
            mkdir -p ~/AppData/Local/electron/Cache ~/AppData/Local/electron-builder/Cache ~/.electron
          fi

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.electron
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Cache Portable Git
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: apps/desktop/build/windows/portable/PortableGit
          key: portable-git-${{ hashFiles('apps/desktop/scripts/build/download-portable-git.js') }}

      - name: Prepare build directory
        run: |
          rm -rf apps/desktop/dist
          mkdir -p apps/desktop/dist
        shell: bash

      - name: Install dependencies
        run: |
          if [ -n "${{ secrets.PACKAGES_PAT }}" ]; then
            echo "@openheaders:registry=https://npm.pkg.github.com" >> ~/.npmrc
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGES_PAT }}" >> ~/.npmrc
          else
            echo "@openheaders:registry=https://npm.pkg.github.com" >> ~/.npmrc
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          fi
          pnpm install --frozen-lockfile
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES_PAT: ${{ secrets.PACKAGES_PAT }}

      - name: Build core package
        run: pnpm --filter @openheaders/core build

      - name: Build desktop application
        run: pnpm --filter @openheaders/desktop build
        env:
          NODE_ENV: production

      - name: Setup macOS code signing
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Clean electron-builder cache
        run: |
          rm -rf apps/desktop/dist
          mkdir -p apps/desktop/dist
        shell: bash

      - name: Detect beta build
        id: detect_beta
        run: |
          if [[ "${{ github.ref_name }}" =~ -beta[.0-9]*$ ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Verify desktop version matches tag
        run: |
          TAG="${GITHUB_REF_NAME/v/}"
          PKG_VERSION=$(node -p "require('./apps/desktop/package.json').version")

          # Extract base version (strip -beta.N suffix)
          TAG_BASE=$(echo "$TAG" | sed 's/-beta\.[0-9]*$//')
          PKG_BASE=$(echo "$PKG_VERSION" | sed 's/-beta\.[0-9]*$//')

          if [ "$TAG_BASE" != "$PKG_BASE" ]; then
            echo "::error::Version mismatch! Tag base is $TAG_BASE but apps/desktop/package.json base is $PKG_BASE"
            echo "::error::Bump apps/desktop/package.json to $TAG_BASE and commit before tagging."
            exit 1
          fi

          echo "Desktop version verified: tag=$TAG, package.json=$PKG_VERSION (base: $TAG_BASE)"

          # Set the full tag version in package.json for the build
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('apps/desktop/package.json'));p.version='$TAG';fs.writeFileSync('apps/desktop/package.json',JSON.stringify(p,null,2)+'\n')"
        shell: bash

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop
        run: pnpm dist:mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop
        run: pnpm dist:win:unsigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Windows Executable
        if: matrix.os == 'windows-latest' && steps.detect_beta.outputs.is_beta != 'true'
        id: find-exe
        run: |
          $exeFile = Get-ChildItem -Path "apps/desktop/dist" -Filter "*-Setup.exe" -File | Select-Object -First 1
          if ($null -eq $exeFile) { Write-Error "No Setup.exe found"; exit 1 }
          Write-Host "Found: $($exeFile.Name)"
          echo "EXE_FILENAME=$($exeFile.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Sign Windows Executables
        if: matrix.os == 'windows-latest' && steps.detect_beta.outputs.is_beta != 'true'
        uses: sslcom/esigner-codesign@v1.3.1
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: apps/desktop/dist/${{ steps.find-exe.outputs.EXE_FILENAME }}
          malware_block: true
          override: true
          environment_name: PROD
          clean_logs: false
          jvm_max_memory: 1024M
          signing_method: v1

      - name: Update latest.yml and blockmap after signing
        if: matrix.os == 'windows-latest' && steps.detect_beta.outputs.is_beta != 'true'
        run: |
          $exePath = "apps/desktop/dist/${{ steps.find-exe.outputs.EXE_FILENAME }}"
          $blockmapPath = "$exePath.blockmap"
          $latestYmlPath = "apps/desktop/dist/latest.yml"

          $appBuilder = "apps/desktop/node_modules\app-builder-bin\win\x64\app-builder.exe"
          if (-not (Test-Path $appBuilder)) {
            $appBuilder = Get-ChildItem -Path "apps/desktop/node_modules" -Recurse -Filter "app-builder.exe" | Select-Object -First 1 -ExpandProperty FullName
          }

          if ($appBuilder -and (Test-Path $appBuilder)) {
            & $appBuilder blockmap --input $exePath --output $blockmapPath --compression gzip
          }

          $hash = Get-FileHash -Path $exePath -Algorithm SHA512
          $hashBytes = [byte[]]::new($hash.Hash.Length / 2)
          for ($i = 0; $i -lt $hash.Hash.Length; $i += 2) {
            $hashBytes[$i / 2] = [Convert]::ToByte($hash.Hash.Substring($i, 2), 16)
          }
          $base64Hash = [Convert]::ToBase64String($hashBytes)
          $fileSize = (Get-Item $exePath).Length

          $content = Get-Content $latestYmlPath -Raw
          $content = $content -replace 'sha512: [A-Za-z0-9+/=]+', "sha512: $base64Hash"
          $content = $content -replace 'size: \d+', "size: $fileSize"
          Set-Content -Path $latestYmlPath -Value $content -NoNewline
        shell: pwsh

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/desktop
        run: |
          pnpm dist:linux

          if [ $(find dist -name "*.rpm" -type f | wc -l) -eq 0 ]; then
            echo "::warning::RPM packages not found, trying explicit build..."
            pnpm dist:linux:rpm:x64
            pnpm dist:linux:rpm:arm64
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm
            apps/desktop/dist/*.yml
            apps/desktop/dist/install-open-headers.sh

  build-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align extension manifests with package.json version
        id: ext_version
        working-directory: apps/extension
        run: |
          TAG="${GITHUB_REF_NAME/v/}"
          EXT_VERSION=$(node -p "require('./package.json').version")

          # If the tag has a beta suffix, apply it to the extension version too
          if [[ "$TAG" =~ (-beta\.[0-9]+)$ ]]; then
            BETA_SUFFIX="${BASH_REMATCH[1]}"
            EXT_BASE=$(echo "$EXT_VERSION" | sed 's/-beta\.[0-9]*$//')
            EXT_VERSION="${EXT_BASE}${BETA_SUFFIX}"
            node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));p.version='$EXT_VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          fi

          echo "version=$EXT_VERSION" >> $GITHUB_OUTPUT

          # Compute numeric manifest version for store compatibility
          if [[ "$EXT_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta\.([0-9]+)$ ]]; then
            MANIFEST_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            MANIFEST_VERSION="$EXT_VERSION"
          fi

          echo "Extension version: $EXT_VERSION (manifest: $MANIFEST_VERSION)"

          for manifest in manifests/*/manifest.json; do
            node -e "const fs=require('fs'),m=JSON.parse(fs.readFileSync('$manifest'));m.version='$MANIFEST_VERSION';fs.writeFileSync('$manifest',JSON.stringify(m,null,2)+'\n')"
          done

      - name: Build core package
        run: pnpm --filter @openheaders/core build

      - name: Build and package extensions
        working-directory: apps/extension
        run: pnpm release

      - name: Write extension version file
        run: |
          mkdir -p apps/extension/releases
          echo "${{ steps.ext_version.outputs.version }}" > apps/extension/releases/EXT_VERSION.txt

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            apps/extension/releases/*.zip
            apps/extension/releases/EXT_VERSION.txt

  release:
    needs: [build-desktop, build-extension]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine release type
        id: release_type
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          if [[ "$TAG_NAME" =~ -beta[.0-9]*$ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Read extension version
        id: ext_ver
        run: |
          EXT_VERSION=$(cat dist/extension-packages/EXT_VERSION.txt)
          echo "version=$EXT_VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $EXT_VERSION"

      - name: Process artifacts for release
        run: |
          mkdir -p processed_files
          VERSION=${GITHUB_REF_NAME/v/}

          # Desktop artifacts
          if [ -d "dist/desktop-windows-latest" ]; then
            cp dist/desktop-windows-latest/*.exe processed_files/ 2>/dev/null || true
            cp dist/desktop-windows-latest/*.blockmap processed_files/ 2>/dev/null || true
            cp dist/desktop-windows-latest/latest.yml processed_files/ 2>/dev/null || true
          fi

          if [ -d "dist/desktop-macos-latest" ]; then
            cp dist/desktop-macos-latest/*.dmg processed_files/ 2>/dev/null || true
            cp dist/desktop-macos-latest/*.zip processed_files/ 2>/dev/null || true
            cp dist/desktop-macos-latest/*.blockmap processed_files/ 2>/dev/null || true
            cp dist/desktop-macos-latest/latest-mac.yml processed_files/ 2>/dev/null || true
          fi

          if [ -d "dist/desktop-ubuntu-latest" ]; then
            cp dist/desktop-ubuntu-latest/*.AppImage processed_files/ 2>/dev/null || true
            cp dist/desktop-ubuntu-latest/*.deb processed_files/ 2>/dev/null || true
            find dist/desktop-ubuntu-latest -name "*.rpm" -exec cp {} processed_files/ \; 2>/dev/null || true
            cp dist/desktop-ubuntu-latest/install-open-headers.sh processed_files/ 2>/dev/null || true
            cp dist/desktop-ubuntu-latest/latest-linux.yml processed_files/ 2>/dev/null || true
            cp dist/desktop-ubuntu-latest/latest-linux-arm64.yml processed_files/ 2>/dev/null || true
          fi

          # Extension artifacts (zips only, not the version file)
          if [ -d "dist/extension-packages" ]; then
            cp dist/extension-packages/*.zip processed_files/ 2>/dev/null || true
          fi

          echo "Files prepared for release:"
          ls -la processed_files/
        shell: bash

      - name: Generate Release Body
        run: |
          VERSION=${GITHUB_REF_NAME/v/}
          EXT_VERSION="${{ steps.ext_ver.outputs.version }}"
          IS_PRERELEASE="${{ steps.release_type.outputs.is_prerelease }}"
          REPO="${{ github.repository }}"
          TAG="$GITHUB_REF_NAME"

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo '> **This is a beta build for early testing.** It may contain bugs.' > release_body.md
            echo '' >> release_body.md
          fi

          DL="https://github.com/${REPO}/releases/download/${TAG}"
          {
            echo "## Desktop App (v${VERSION})"
            echo ""
            echo "### macOS"
            echo "- [Intel (x64)](${DL}/OpenHeaders-${VERSION}-mac-x64.dmg)"
            echo "- [Apple Silicon (ARM64)](${DL}/OpenHeaders-${VERSION}-mac-arm64.dmg)"
            echo ""
            echo "### Windows"
            echo "- [Windows Installer](${DL}/OpenHeaders-${VERSION}-Setup.exe)"
            echo ""
            echo "### Linux"
            echo "- [AppImage x64](${DL}/OpenHeaders-${VERSION}-x64.AppImage)"
            echo "- [AppImage ARM64](${DL}/OpenHeaders-${VERSION}-arm64.AppImage)"
            echo "- [Debian/Ubuntu x64](${DL}/open-headers_${VERSION}_amd64.deb)"
            echo "- [Debian/Ubuntu ARM64](${DL}/open-headers_${VERSION}_arm64.deb)"
            echo "- [Fedora/RHEL x64](${DL}/open-headers-${VERSION}.x86_64.rpm)"
            echo "- [Fedora/RHEL ARM64](${DL}/open-headers-${VERSION}.aarch64.rpm)"
            echo "- [Install Script](${DL}/install-open-headers.sh)"
            echo ""
            echo "## Browser Extension (v${EXT_VERSION})"
            echo ""
            echo "- [Chrome](${DL}/open-headers-chrome-v${EXT_VERSION}.zip)"
            echo "- [Firefox](${DL}/open-headers-firefox-v${EXT_VERSION}.zip)"
            echo "- [Edge](${DL}/open-headers-edge-v${EXT_VERSION}.zip)"
            echo "- [Safari](${DL}/open-headers-safari-v${EXT_VERSION}.zip)"
          } >> release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          name: "${{ github.ref_name }}"
          files: processed_files/*
          fail_on_unmatched_files: false
          body_path: release_body.md
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
