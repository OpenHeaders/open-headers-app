name: Release Extension

on:
  push:
    tags:
      - 'ext-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align versions with tag
        working-directory: apps/extension
        run: |
          TAG="${GITHUB_REF_NAME/ext-v/}"

          # 1. Set package.json to full semver
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));p.version='$TAG';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

          # 2. Compute numeric manifest version
          if [[ "$TAG" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta\.([0-9]+)$ ]]; then
            MANIFEST_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            MANIFEST_VERSION="$TAG"
          fi

          echo "package.json version: $TAG"
          echo "manifest version: $MANIFEST_VERSION"

          for manifest in manifests/*/manifest.json; do
            node -e "const fs=require('fs'),m=JSON.parse(fs.readFileSync('$manifest'));m.version='$MANIFEST_VERSION';fs.writeFileSync('$manifest',JSON.stringify(m,null,2)+'\n')"
          done

      - name: Build core package
        run: pnpm --filter @openheaders/core build

      - name: Build and package extensions
        working-directory: apps/extension
        run: pnpm release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: apps/extension/releases/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-packages
          path: releases

      - name: Determine release type
        id: release_type
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          if [[ "$TAG_NAME" =~ -beta[.0-9]*$ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Body
        run: |
          VERSION=${GITHUB_REF_NAME/ext-v/}
          IS_PRERELEASE="${{ steps.release_type.outputs.is_prerelease }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo '> **This is a beta build.** It may contain bugs.' > release_body.md
            echo '' >> release_body.md
          fi

          cat >> release_body.md << EOF
          ## Downloads

          - [Chrome](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-chrome-v${VERSION}.zip)
          - [Firefox](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-firefox-v${VERSION}.zip)
          - [Edge](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-edge-v${VERSION}.zip)
          - [Safari](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-safari-v${VERSION}.zip)

          ## Installation

          **Chrome / Edge**: Download zip, extract, go to \`chrome://extensions\`, enable Developer mode, click Load unpacked.
          **Firefox**: Download zip, go to \`about:debugging#/runtime/this-firefox\`, click Load Temporary Add-on.
          **Safari**: Download zip, run \`xcrun safari-web-extension-converter\`, build from Xcode.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          name: "${{ github.ref_name }}"
          files: releases/*.zip
          body_path: release_body.md
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
