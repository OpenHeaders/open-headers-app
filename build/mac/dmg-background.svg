<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="540" height="380" viewBox="0 0 540 380">
  <defs>
    <!-- Subtle gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f5"/>
    </linearGradient>

    <!-- Arrow gradient matching brand -->
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5890FF"/>
      <stop offset="100%" style="stop-color:#4A7FE8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="540" height="380" fill="url(#bgGradient)"/>

  <!-- Product name -->
  <text x="270" y="70"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="34"
        font-weight="700"
        fill="#1d1d1f"
        text-anchor="middle"
        text-rendering="geometricPrecision">
    OpenHeaders
  </text>

  <!-- Tagline -->
  <text x="270" y="100"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="15"
        font-weight="400"
        fill="#6e6e73"
        text-anchor="middle"
        text-rendering="geometricPrecision">
    Browser Development Toolkit
  </text>

  <!-- Arrow - curved line from app icon area to Applications area (curves downward) -->
  <path d="M 200 215 Q 270 260 345 218"
        stroke="url(#arrowGradient)"
        stroke-width="5"
        stroke-linecap="round"
        fill="none"/>

  <!-- Arrow head - centered at end of curve -->
  <polygon points="358,218 340,230 340,206"
           fill="#4A7FE8"/>

  <!-- "Drag to install" helper text -->
  <text x="270" y="320"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="16"
        font-weight="700"
        fill="#3a3a3c"
        text-anchor="middle"
        text-rendering="geometricPrecision">
    Drag to install
  </text>
</svg>
