name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install Electron system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 libgbm1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm biome check . || echo "::warning::Lint issues found — see output above"

      - name: Typecheck all packages
        run: pnpm turbo typecheck

      - name: Test core
        run: |
          echo "### Core" >> $GITHUB_STEP_SUMMARY
          pnpm --filter @openheaders/core test -- --reporter=default --reporter=github-actions

      - name: Test extension
        run: |
          echo "### Browser Extension" >> $GITHUB_STEP_SUMMARY
          pnpm --filter @openheaders/extension test -- --reporter=default --reporter=github-actions

      - name: Test desktop
        run: |
          echo "### Desktop App" >> $GITHUB_STEP_SUMMARY
          pnpm --filter @openheaders/desktop test -- --reporter=default --reporter=github-actions

      - name: Build all packages
        run: pnpm turbo build
