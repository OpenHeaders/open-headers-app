name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript typecheck (main)
        run: npx tsc --noEmit

      - name: TypeScript typecheck (renderer)
        run: npx tsc -p src/renderer/tsconfig.json --noEmit

      - name: Run unit tests
        run: npx vitest run

      - name: Build app (for e2e)
        run: npm run build

      - name: Run e2e tests
        run: xvfb-run --auto-servernum npx playwright test
